            TableName: !Ref CalendarConnectionsTable
        - Statement:
            Effect: Allow
            Action:
              - kms:Decrypt
              - kms:DescribeKey
            Resource: !GetAtt StripeKeysEncryptionKey.Arn
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:jb/google-oauth/*"
      Events:
        Availability:
          Type: Api
