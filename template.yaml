      CodeUri: src/
      Handler: handlers.stripe_connect.callback_handler
      Description: Handles Stripe Connect OAuth callbacks and stores encrypted tenant OAuth tokens.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-dev"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-prod"
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*"
              Condition:
                StringEquals:
