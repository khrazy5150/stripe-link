  CalendarFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-calendar-api-${Environment}"
      CodeUri: src/
      Handler: handlers.calendar.handler
      Description: Per-tenant Google Calendar OAuth connect/callback + connection status.
      Environment:
        Variables:
          CALENDAR_REDIRECT_URI: !Ref CalendarRedirectUri
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CalendarConnectionsTable
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:jb/google-oauth/*"
        - Statement:
            Effect: Allow
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:DescribeKey
            Resource: !GetAtt StripeKeysEncryptionKey.Arn
      Events:
        Connect:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /calendar/connect
            Method: POST
        Callback:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /calendar/callback
            Method: GET
        ConnectionStatus:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /calendar/connection
            Method: GET
        Disconnect:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /calendar/connection
            Method: DELETE
        ConnectionsList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /calendar/connections
            Method: GET
        ConnectionUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /calendar/connections/{connection_id}
            Method: PATCH
        ConnectionDelete:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /calendar/connections/{connection_id}
            Method: DELETE

