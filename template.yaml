      CodeUri: src/
      Handler: handlers.reminders.handler
      Description: Scheduled sweep that delivers due appointment SMS reminders via AWS End User Messaging.
      Timeout: 120
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ServicesTable
        - DynamoDBReadPolicy:
            TableName: !Ref TenantProfilesTable
        - Statement:
            Effect: Allow
            Action:
              - sms-voice:SendTextMessage
            Resource: "*"
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:jb/sms-origination/*"
      Events:
        ReminderSweep:
          Type: Schedule
          Properties:
            Schedule: rate(15 minutes)
            Description: Trigger the appointment SMS reminder sweep.

