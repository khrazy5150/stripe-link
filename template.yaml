AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: stripe-link - JSON-first Stripe Cart rebuild

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment.
  ProjectPrefix:
    Type: String
    Default: jb
    AllowedValues:
      - jb
    Description: Prefix used to isolate stripe-link resources from stripe-cart.
  StripeClientId:
    Type: String
    Default: ""
    Description: Stripe Connect OAuth client ID.
  StripeConnectRedirectUri:
    Type: String
    Default: ""
    Description: Stripe Connect OAuth redirect URI.
  ApiCustomDomainName:
    Type: String
    Default: ""
    Description: Optional API Gateway custom domain name, such as dev.juniorbay.com.
  ApiCustomDomainCertificateArn:
    Type: String
    Default: ""
    Description: Optional regional ACM certificate ARN for the API Gateway custom domain.
  ApiCustomDomainHostedZoneName:
    Type: String
    Default: juniorbay.com.
    Description: Route 53 hosted zone name used for the API custom domain alias record.
  DashboardCustomDomainName:
    Type: String
    Default: ""
    Description: Optional CloudFront custom domain name for the dashboard, such as dashboard.juniorbay.com.
  DashboardCustomDomainCertificateArn:
    Type: String
    Default: ""
    Description: Optional us-east-1 ACM certificate ARN for the dashboard CloudFront distribution.
  DashboardCustomDomainHostedZoneName:
    Type: String
    Default: juniorbay.com.
    Description: Route 53 hosted zone name used for the dashboard custom domain alias record.
  CognitoUserPoolId:
    Type: String
    Default: us-west-2_gBemPnEF8
    Description: Existing Cognito user pool used as the dashboard auth gatekeeper.
  CognitoUserPoolClientId:
    Type: String
    Default: 2cusn1634kl6hqgn78r0h346m0
    Description: Existing Cognito app client ID used by the dashboard auth API.

Conditions:
  HasApiCustomDomain: !And
    - !Not [!Equals [!Ref ApiCustomDomainName, ""]]
    - !Not [!Equals [!Ref ApiCustomDomainCertificateArn, ""]]
  HasDashboardCustomDomain: !And
    - !Not [!Equals [!Ref DashboardCustomDomainName, ""]]
    - !Not [!Equals [!Ref DashboardCustomDomainCertificateArn, ""]]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        PROJECT_PREFIX: !Ref ProjectPrefix
        APP_CONFIG_TABLE: !Ref AppConfigTable
        STRIPE_KEYS_TABLE: !Ref StripeKeysTable
        STRIPE_KEYS_TABLE_DEV: !Sub "${ProjectPrefix}-stripe-keys-dev"
        STRIPE_KEYS_TABLE_PROD: !Sub "${ProjectPrefix}-stripe-keys-prod"
        PLATFORM_CONFIG_TABLE: !Ref PlatformConfigTable
        SHIPPING_CONFIG_TABLE: !Ref ShippingConfigTable
        TENANT_PROFILES_TABLE: !Ref TenantProfilesTable
        USER_PREFERENCES_TABLE: !Ref UserPreferencesTable
        USER_PROFILES_TABLE: !Ref UserProfilesTable
        NOTIFICATIONS_TABLE: !Ref NotificationsTable
        SERVICES_TABLE: !Ref ServicesTable
        INVOICES_TABLE: !Ref InvoicesTable
        PRODUCTS_TABLE: !Ref ProductsTable
        OFFERS_TABLE: !Ref OffersTable
        COUPONS_TABLE: !Ref CouponsTable
        PAGES_TABLE: !Ref PagesTable
        CHECKOUT_SESSIONS_TABLE: !Ref CheckoutSessionsTable
        ORDERS_TABLE: !Ref OrdersTable
        CUSTOMERS_TABLE: !Ref CustomersTable
        DOCUMENT_EVENTS_TABLE: !Ref DocumentEventsTable
        ROUTES_TABLE: !Ref RoutesTable
        TIER_POLICIES_TABLE: !Ref TierPoliciesTable
        MEDIA_TABLE: !Ref MediaTable
        THEMES_TABLE: !Ref ThemesTable
        LEGAL_PAGES_TABLE: !Ref LegalPagesTable
        CUSTOM_DOMAINS_TABLE: !Ref CustomDomainsTable
        PAGES_BUCKET: !Ref PagesBucket
        PAGES_PREVIEW_BUCKET: !Ref PagesPreviewBucket
        MEDIA_BUCKET: !Ref MediaBucket
        TEMPLATES_BUCKET: !Ref TemplatesBucket
        BILLING_CONFIG_BUCKET: !Ref ConfigBucket
        BILLING_CONFIG_KEY: global_billing_config.json
        PAGES_DISTRIBUTION_ID: !Ref PagesDistribution
        PAGES_DISTRIBUTION_DOMAIN: !GetAtt PagesDistribution.DomainName
        PREVIEW_DISTRIBUTION_ID: !Ref PreviewDistribution
        PREVIEW_DISTRIBUTION_DOMAIN: !GetAtt PreviewDistribution.DomainName
        STRIPE_CLIENT_ID: !Ref StripeClientId
        STRIPE_CONNECT_REDIRECT_URI: !Ref StripeConnectRedirectUri
        STRIPE_KEYS_KMS_KEY_ID: !Ref StripeKeysEncryptionKey
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_USER_POOL_CLIENT_ID: !Ref CognitoUserPoolClientId
    Tracing: Active

Resources:
  StripeKeysEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "Encrypt tenant Stripe secrets for ${ProjectPrefix}-${Environment}"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  StripeKeysEncryptionAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectPrefix}-stripe-keys-${Environment}"
      TargetKeyId: !Ref StripeKeysEncryptionKey

  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      EndpointConfiguration: REGIONAL
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,PATCH,DELETE'"
        AllowHeaders: "'Content-Type,Authorization,X-Tenant-Id,X-Client-Id,X-Environment,X-Stripe-Mode'"
        AllowOrigin: "'*'"

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: HasApiCustomDomain
    Properties:
      DomainName: !Ref ApiCustomDomainName
      EndpointConfiguration:
        Types:
          - REGIONAL
      RegionalCertificateArn: !Ref ApiCustomDomainCertificateArn
      SecurityPolicy: TLS_1_2

  ApiCustomDomainBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasApiCustomDomain
    Properties:
      DomainName: !Ref ApiCustomDomain
      RestApiId: !Ref RestApi
      Stage: !Ref Environment

  ApiCustomDomainRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasApiCustomDomain
    Properties:
      HostedZoneName: !Ref ApiCustomDomainHostedZoneName
      Name: !Ref ApiCustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-health-${Environment}"
      CodeUri: src/
      Handler: handlers.health.lambda_handler
      Description: Health check for stripe-link.
      Events:
        Health:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /health
            Method: GET

  ManifestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-manifest-${Environment}"
      CodeUri: src/
      Handler: handlers.manifest.lambda_handler
      Description: Runtime manifest for stripe-link resource isolation checks.
      Events:
        Manifest:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /manifest
            Method: GET

  AppConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-app-config-api-${Environment}"
      CodeUri: src/
      Handler: handlers.app_config.handler
      Description: Environment-level app configuration API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppConfigTable
      Events:
        AppConfigGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /app-config/{config_key}
            Method: GET
        AppConfigPut:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /app-config/{config_key}
            Method: PUT
        AppConfigOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /app-config/{config_key}
            Method: OPTIONS

  OfferResolveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-offer-resolve-${Environment}"
      CodeUri: src/
      Handler: handlers.offers.resolve_handler
      Description: Resolves an offer against canonical product and price JSON.
      Events:
        ResolveOffer:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /offers/resolve
            Method: POST

  PriceCalculationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-prices-api-${Environment}"
      CodeUri: src/
      Handler: handlers.prices.handler
      Description: Calculates customer-facing price amounts and fee breakdowns.
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ConfigBucket
      Events:
        PriceCalculate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /prices/calculate
            Method: POST
        PriceCalculateOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /prices/calculate
            Method: OPTIONS

  ProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-products-api-${Environment}"
      CodeUri: src/
      Handler: handlers.products.handler
      Description: JSON-first products API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
      Events:
        ProductsList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products
            Method: GET
        ProductsCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products
            Method: POST
        ProductsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products
            Method: OPTIONS
        ProductsGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}
            Method: GET
        ProductOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}
            Method: OPTIONS
        ProductStatusUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}/status
            Method: PATCH
        ProductStatusOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}/status
            Method: OPTIONS

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-upload-api-${Environment}"
      CodeUri: src/
      Handler: handlers.upload.handler
      Description: Browser-safe proxy for product image upload presigning and status.
      Environment:
        Variables:
          IMAGE_UPLOAD_API_BASE: https://dph4d1c6p8.execute-api.us-west-2.amazonaws.com/v3
      Events:
        UploadCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload/multiple
            Method: POST
        UploadCreateOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload/multiple
            Method: OPTIONS
        UploadStatus:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload/status/{image_id}
            Method: GET
        UploadStatusOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload/status/{image_id}
            Method: OPTIONS

  OffersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-offers-api-${Environment}"
      CodeUri: src/
      Handler: handlers.offers.handler
      Description: JSON-first offers API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OffersTable
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
      Events:
        OffersList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /offers
            Method: GET
        OffersCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /offers
            Method: POST
        OffersGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /offers/{offer_id}
            Method: GET

  CouponsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-coupons-api-${Environment}"
      CodeUri: src/
      Handler: handlers.coupons.handler
      Description: JSON-first coupons API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CouponsTable
      Events:
        CouponsList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons
            Method: GET
        CouponsCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons
            Method: POST
        CouponsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons
            Method: OPTIONS
        CouponsGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons/{coupon_id}
            Method: GET
        CouponsUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons/{coupon_id}
            Method: PUT
        CouponsItemOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons/{coupon_id}
            Method: OPTIONS

  PagesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-pages-api-${Environment}"
      CodeUri: src/
      Handler: handlers.pages.handler
      Description: JSON-first pages API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PagesTable
      Events:
        PagesList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages
            Method: GET
        PagesCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages
            Method: POST
        PagesGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages/{page_id}
            Method: GET

  PageRenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-page-render-${Environment}"
      CodeUri: src/
      Handler: handlers.page_render.handler
      Description: Renders page JSON, offer JSON, and product JSON into HTML.
      Events:
        PageRender:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages/render
            Method: POST

  PagePublishFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-page-publish-${Environment}"
      CodeUri: src/
      Handler: handlers.page_publish.handler
      Description: Renders page documents from the PagesTable stream into preview, test, and published page artifacts.
      Timeout: 60
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OffersTable
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
        - S3CrudPolicy:
            BucketName: !Ref PagesBucket
        - S3CrudPolicy:
            BucketName: !Ref PagesPreviewBucket
        - Statement:
            Effect: Allow
            Action:
              - cloudfront:CreateInvalidation
            Resource: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${PagesDistribution}"
      Events:
        PagesChanged:
          Type: DynamoDB
          Properties:
            Stream: !GetAtt PagesTable.StreamArn
            StartingPosition: LATEST
            BatchSize: 10
            MaximumBatchingWindowInSeconds: 5
            FunctionResponseTypes:
              - ReportBatchItemFailures

  RegistrationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-registration-api-${Environment}"
      CodeUri: src/
      Handler: handlers.registration.handler
      Description: Tenant registration and profile API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TenantProfilesTable
      Events:
        RegisterTenant:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /register
            Method: POST
        GetTenant:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /tenants/{tenant_id}
            Method: GET

  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-auth-api-${Environment}"
      CodeUri: src/
      Handler: handlers.auth.handler
      Description: Cognito-backed dashboard authentication API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TenantProfilesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfilesTable
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminGetUser
                - cognito-idp:AdminUpdateUserAttributes
              Resource: !Sub "arn:aws:cognito-idp:${AWS::Region}:${AWS::AccountId}:userpool/${CognitoUserPoolId}"
      Events:
        AuthRegister:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/register
            Method: POST
        AuthConfirm:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/confirm
            Method: POST
        AuthLogin:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/login
            Method: POST
        AuthForgot:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/forgot
            Method: POST
        AuthReset:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/reset
            Method: POST

  StripeKeysFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-stripe-keys-api-${Environment}"
      CodeUri: src/
      Handler: handlers.stripe_keys.handler
      Description: Tenant Stripe key metadata API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-dev"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-prod"
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - kms:Encrypt
                - kms:Decrypt
                - kms:GenerateDataKey
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:key/*"
              Condition:
                StringEquals:
                  kms:EncryptionContext:service: stripe-link
      Events:
        GetStripeKeys:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /stripe/keys
            Method: GET
        SaveStripeKeys:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /stripe/keys
            Method: PUT
        VerifyStripeKeys:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /stripe/keys/verify
            Method: POST

  StripeConnectStartFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-stripe-connect-start-${Environment}"
      CodeUri: src/
      Handler: handlers.stripe_connect.start_handler
      Description: Starts Stripe Connect OAuth.
      Events:
        StripeConnectStart:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /stripe/connect/start
            Method: GET

  StripeConnectStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-stripe-connect-status-${Environment}"
      CodeUri: src/
      Handler: handlers.stripe_connect.status_handler
      Description: Reads or updates tenant Stripe Connect status.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref StripeKeysTable
      Events:
        GetStripeConnectStatus:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /stripe/connect/status
            Method: GET
        SaveStripeConnectStatus:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /stripe/connect/status
            Method: PUT

  ConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-config-api-${Environment}"
      CodeUri: src/
      Handler: handlers.config.handler
      Description: Tenant configuration API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PlatformConfigTable
      Events:
        GetConfig:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /config
            Method: GET
        SaveConfig:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /config
            Method: PUT

  PreferencesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-preferences-api-${Environment}"
      CodeUri: src/
      Handler: handlers.preferences.handler
      Description: User preferences API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserPreferencesTable
      Events:
        GetPreferences:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /preferences
            Method: GET
        SavePreferences:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /preferences
            Method: PUT

  UserProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-user-profile-api-${Environment}"
      CodeUri: src/
      Handler: handlers.profile.handler
      Description: User profile API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UserProfilesTable
      Events:
        GetProfile:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /profile
            Method: GET
        SaveProfile:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /profile
            Method: PUT

  NotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-notifications-api-${Environment}"
      CodeUri: src/
      Handler: handlers.notifications.handler
      Description: Notifications and refund request API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationsTable
      Events:
        GetNotifications:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /notifications
            Method: GET
        SaveNotification:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /notifications
            Method: PUT
        GetRefundRequests:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /notifications/refund-requests
            Method: GET
        SaveRefundRequest:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /notifications/refund-requests
            Method: PUT

  ShippingFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-shipping-api-${Environment}"
      CodeUri: src/
      Handler: handlers.shipping.handler
      Description: Tenant shipping configuration API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ShippingConfigTable
      Events:
        GetShipping:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /shipping
            Method: GET
        SaveShipping:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /shipping
            Method: PUT

  CustomersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-customers-api-${Environment}"
      CodeUri: src/
      Handler: handlers.customers.handler
      Description: Customer management API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CustomersTable
      Events:
        CustomersList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /customers
            Method: GET
        CustomersSave:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /customers
            Method: PUT
        CustomersGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /customers/{customer_id}
            Method: GET

  ServicesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-services-api-${Environment}"
      CodeUri: src/
      Handler: handlers.services.handler
      Description: Service booking, fulfillers, availability, and appointments API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ServicesTable
      Events:
        ServicesList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /services
            Method: GET
        ServicesSave:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /services
            Method: PUT
        ServicesGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /services/{service_id}
            Method: GET
        Fulfillers:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /services/fulfillers
            Method: ANY
        AvailabilityDefaults:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /services/availability/defaults
            Method: ANY
        AvailabilityExceptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /services/availability/exceptions
            Method: ANY
        Appointments:
