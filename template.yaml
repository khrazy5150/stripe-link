AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: stripe-link - JSON-first Stripe Cart rebuild

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment.
  ProjectPrefix:
    Type: String
    Default: jb
    AllowedPattern: '^[a-z][a-z0-9-]*$'
    Description: Prefix used to isolate stripe-link resources from stripe-cart.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        PROJECT_PREFIX: !Ref ProjectPrefix
        APP_CONFIG_TABLE: !Ref AppConfigTable
        STRIPE_KEYS_TABLE: !Ref StripeKeysTable
        PLATFORM_CONFIG_TABLE: !Ref PlatformConfigTable
        PRODUCTS_TABLE: !Ref ProductsTable
        OFFERS_TABLE: !Ref OffersTable
        PAGES_TABLE: !Ref PagesTable
        CHECKOUT_SESSIONS_TABLE: !Ref CheckoutSessionsTable
        ORDERS_TABLE: !Ref OrdersTable
        CUSTOMERS_TABLE: !Ref CustomersTable
        DOCUMENT_EVENTS_TABLE: !Ref DocumentEventsTable
        ROUTES_TABLE: !Ref RoutesTable
        TIER_POLICIES_TABLE: !Ref TierPoliciesTable
        MEDIA_TABLE: !Ref MediaTable
        THEMES_TABLE: !Ref ThemesTable
        LEGAL_PAGES_TABLE: !Ref LegalPagesTable
        CUSTOM_DOMAINS_TABLE: !Ref CustomDomainsTable
        PAGES_BUCKET: !Ref PagesBucket
        PAGES_PREVIEW_BUCKET: !Ref PagesPreviewBucket
        MEDIA_BUCKET: !Ref MediaBucket
        TEMPLATES_BUCKET: !Ref TemplatesBucket
    Tracing: Active

Resources:
  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      EndpointConfiguration: REGIONAL

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-health-${Environment}"
      CodeUri: src/
      Handler: handlers.health.lambda_handler
      Description: Health check for stripe-link.
      Events:
        Health:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /health
            Method: GET

  AppConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-app-config-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: config_key
          AttributeType: S
        - AttributeName: environment
          AttributeType: S
      KeySchema:
        - AttributeName: config_key
          KeyType: HASH
        - AttributeName: environment
          KeyType: RANGE

  StripeKeysTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-stripe-keys-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH

  PlatformConfigTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-platform-config-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH

  ProductsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-products-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  OffersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-offers-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions: &DocumentAttributeDefinitions
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: GSI1PK
          AttributeType: S
        - AttributeName: GSI1SK
          AttributeType: S
      KeySchema: &DocumentKeySchema
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes: &DocumentGlobalSecondaryIndexes
        - IndexName: GSI1
          KeySchema:
            - AttributeName: GSI1PK
              KeyType: HASH
            - AttributeName: GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  PagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-pages-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      AttributeDefinitions: *DocumentAttributeDefinitions
      KeySchema: *DocumentKeySchema
      GlobalSecondaryIndexes: *DocumentGlobalSecondaryIndexes

  CheckoutSessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-checkout-sessions-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: session_id
          AttributeType: S
      KeySchema:
        - AttributeName: session_id
          KeyType: HASH

  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-orders-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: order_id
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: order_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: CreatedAtIndex
          KeySchema:
            - AttributeName: tenant_id
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  CustomersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-customers-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: tenant_id
          AttributeType: S
        - AttributeName: customer_id
          AttributeType: S
      KeySchema:
        - AttributeName: tenant_id
          KeyType: HASH
        - AttributeName: customer_id
          KeyType: RANGE

  DocumentEventsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-document-events-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: document_id
          AttributeType: S
        - AttributeName: event_id
          AttributeType: S
      KeySchema:
        - AttributeName: document_id
          KeyType: HASH
        - AttributeName: event_id
          KeyType: RANGE

  RoutesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-routes-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions: *DocumentAttributeDefinitions
      KeySchema: *DocumentKeySchema
      GlobalSecondaryIndexes: *DocumentGlobalSecondaryIndexes

  TierPoliciesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-tier-policies-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions:
        - AttributeName: tier_id
          AttributeType: S
        - AttributeName: version
          AttributeType: S
      KeySchema:
        - AttributeName: tier_id
          KeyType: HASH
        - AttributeName: version
          KeyType: RANGE

  MediaTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-media-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions: *DocumentAttributeDefinitions
      KeySchema: *DocumentKeySchema
      GlobalSecondaryIndexes: *DocumentGlobalSecondaryIndexes

  ThemesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-themes-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions: *DocumentAttributeDefinitions
      KeySchema: *DocumentKeySchema
      GlobalSecondaryIndexes: *DocumentGlobalSecondaryIndexes

  LegalPagesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-legal-pages-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions: *DocumentAttributeDefinitions
      KeySchema: *DocumentKeySchema
      GlobalSecondaryIndexes: *DocumentGlobalSecondaryIndexes

  CustomDomainsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectPrefix}-custom-domains-${Environment}"
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      AttributeDefinitions: *DocumentAttributeDefinitions
      KeySchema: *DocumentKeySchema
      GlobalSecondaryIndexes: *DocumentGlobalSecondaryIndexes

  PagesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectPrefix}-pages-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration: &PrivateBucketAccess
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption: &BucketEncryption
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      VersioningConfiguration:
        Status: Enabled

  PagesPreviewBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectPrefix}-pages-preview-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration: *PrivateBucketAccess
      BucketEncryption: *BucketEncryption
      VersioningConfiguration:
        Status: Enabled

  MediaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectPrefix}-media-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration: *PrivateBucketAccess
      BucketEncryption: *BucketEncryption
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders:
              - "*"
            AllowedMethods:
              - GET
              - PUT
              - POST
            AllowedOrigins:
              - "*"
            MaxAge: 3000
      VersioningConfiguration:
        Status: Enabled

  TemplatesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectPrefix}-templates-${Environment}-${AWS::AccountId}"
      PublicAccessBlockConfiguration: *PrivateBucketAccess
      BucketEncryption: *BucketEncryption
      VersioningConfiguration:
        Status: Enabled

Outputs:
  ApiUrl:
    Description: Base URL for the stripe-link API.
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
  HealthUrl:
    Description: Health check endpoint.
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}/health"
  PagesBucketName:
    Description: Published pages bucket.
    Value: !Ref PagesBucket
  PagesPreviewBucketName:
    Description: Preview pages bucket.
    Value: !Ref PagesPreviewBucket
  MediaBucketName:
    Description: Media bucket.
    Value: !Ref MediaBucket
  TemplatesBucketName:
    Description: Template bucket.
    Value: !Ref TemplatesBucket
