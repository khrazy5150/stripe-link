AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: stripe-link - JSON-first Stripe Cart rebuild

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod
    Description: Deployment environment.
  ProjectPrefix:
    Type: String
    Default: jb
    AllowedValues:
      - jb
    Description: Prefix used to isolate stripe-link resources from stripe-cart.
  StripeClientId:
    Type: String
    Default: ""
    Description: Legacy Stripe Connect live OAuth client ID.
  StripeClientIdTest:
    Type: String
    Default: ""
    Description: Stripe Connect test OAuth client ID.
  StripeClientIdLive:
    Type: String
    Default: ""
    Description: Stripe Connect live OAuth client ID.
  CalendarRedirectUri:
    Type: String
    Default: ""
    Description: OAuth redirect URI for Google Calendar connect (must be registered in the Google OAuth client). e.g. https://dev.juniorbay.com/calendar/callback

  StripeConnectRedirectUri:
    Type: String
    Default: ""
    Description: Stripe Connect OAuth redirect URI.
  StripePlatformSecretArn:
    Type: String
    Default: ""
    Description: Optional Secrets Manager ARN containing Junior Bay platform Stripe secret keys.
  ApiCustomDomainName:
    Type: String
    Default: ""
    Description: Optional API Gateway custom domain name, such as dev.juniorbay.com.
  ApiCustomDomainCertificateArn:
    Type: String
    Default: ""
    Description: Optional regional ACM certificate ARN for the API Gateway custom domain.
  ApiCustomDomainHostedZoneName:
    Type: String
    Default: juniorbay.com.
    Description: Route 53 hosted zone name used for the API custom domain alias record.
  DashboardCustomDomainName:
    Type: String
    Default: ""
    Description: Optional CloudFront custom domain name for the dashboard, such as dashboard.juniorbay.com.
  DashboardCustomDomainCertificateArn:
    Type: String
    Default: ""
    Description: Optional us-east-1 ACM certificate ARN for the dashboard CloudFront distribution.
  DashboardCustomDomainHostedZoneName:
    Type: String
    Default: juniorbay.com.
    Description: Route 53 hosted zone name used for the dashboard custom domain alias record.
  CognitoUserPoolId:
    Type: String
    Default: us-west-2_gBemPnEF8
    Description: Existing Cognito user pool used as the dashboard auth gatekeeper.
  CognitoUserPoolClientId:
    Type: String
    Default: 2cusn1634kl6hqgn78r0h346m0
    Description: Existing Cognito app client ID used by the dashboard auth API.
  CloudflareZoneId:
    Type: String
    Default: ""
    Description: Cloudflare zone ID (Cloudflare for SaaS) used to create custom hostnames for tenant custom domains.
  CustomDomainTargetHost:
    Type: String
    Default: domains.jbay.uk
    Description: Hostname tenants CNAME their custom subdomain to (the Cloudflare for SaaS fallback origin, on the dedicated jbay.uk zone).
  ShortUrlHost:
    Type: String
    Default: go.jbay.uk
    Description: Public short-URL host served by the Cloudflare Worker on the jbay.uk zone (short links look like https://go.jbay.uk/{code}).

  EmailFromAddress:
    Type: String
    Default: support@juniorbay.net
    Description: Verified SES sender address for transactional email (receipts). Tenant business name is used as the display name and tenant support email as Reply-To.

Conditions:
  HasApiCustomDomain: !And
    - !Not [!Equals [!Ref ApiCustomDomainName, ""]]
    - !Not [!Equals [!Ref ApiCustomDomainCertificateArn, ""]]
  HasDashboardCustomDomain: !And
    - !Not [!Equals [!Ref DashboardCustomDomainName, ""]]
    - !Not [!Equals [!Ref DashboardCustomDomainCertificateArn, ""]]
  HasStripePlatformSecret: !Not [!Equals [!Ref StripePlatformSecretArn, ""]]
  HasCloudflareZone: !Not [!Equals [!Ref CloudflareZoneId, ""]]

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Architectures:
      - x86_64
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment
        PROJECT_PREFIX: !Ref ProjectPrefix
        APP_CONFIG_TABLE: !Ref AppConfigTable
        STRIPE_KEYS_TABLE: !Ref StripeKeysTable
        STRIPE_KEYS_TABLE_DEV: !Sub "${ProjectPrefix}-stripe-keys-dev"
        STRIPE_KEYS_TABLE_PROD: !Sub "${ProjectPrefix}-stripe-keys-prod"
        PLATFORM_CONFIG_TABLE: !Ref PlatformConfigTable
        SHIPPING_CONFIG_TABLE: !Ref ShippingConfigTable
        TENANT_PROFILES_TABLE: !Ref TenantProfilesTable
        TENANT_PROFILES_TABLE_DEV: !Sub "${ProjectPrefix}-tenant-profiles-dev"
        TENANT_PROFILES_TABLE_PROD: !Sub "${ProjectPrefix}-tenant-profiles-prod"
        USER_PREFERENCES_TABLE: !Ref UserPreferencesTable
        USER_PROFILES_TABLE: !Ref UserProfilesTable
        NOTIFICATIONS_TABLE: !Ref NotificationsTable
        SERVICES_TABLE: !Ref ServicesTable
        INVOICES_TABLE: !Ref InvoicesTable
        PRODUCTS_TABLE: !Ref ProductsTable
        OFFERS_TABLE: !Ref OffersTable
        COUPONS_TABLE: !Ref CouponsTable
        PAGES_TABLE: !Ref PagesTable
        CHECKOUT_SESSIONS_TABLE: !Ref CheckoutSessionsTable
        ORDERS_TABLE: !Ref OrdersTable
        REFUNDS_TABLE: !Ref RefundsTable
        LEDGER_TABLE: !Ref LedgerTable
        WEBHOOK_EVENTS_TABLE: !Ref WebhookEventsTable
        CUSTOMERS_TABLE: !Ref CustomersTable
        DOCUMENT_EVENTS_TABLE: !Ref DocumentEventsTable
        ROUTES_TABLE: !Ref RoutesTable
        EXPERIMENTS_TABLE: !Ref ExperimentsTable
        EMAIL_FROM_ADDRESS: !Ref EmailFromAddress
        TIER_POLICIES_TABLE: !Ref TierPoliciesTable
        MEDIA_TABLE: !Ref MediaTable
        THEMES_TABLE: !Ref ThemesTable
        LEGAL_PAGES_TABLE: !Ref LegalPagesTable
        CUSTOM_DOMAINS_TABLE: !Ref CustomDomainsTable
        CALENDAR_CONNECTIONS_TABLE: !Ref CalendarConnectionsTable
        SMS_ORIGINATION_SECRET_NAME: !Sub "jb/sms-origination/${Environment}"
        GOOGLE_OAUTH_SECRET_NAME: !Sub "jb/google-oauth/${Environment}"
        PAGES_BUCKET: !Ref PagesBucket
        PAGES_PREVIEW_BUCKET: !Ref PagesPreviewBucket
        MEDIA_BUCKET: !Ref MediaBucket
        TEMPLATES_BUCKET: !Ref TemplatesBucket
        BILLING_CONFIG_BUCKET: !Ref ConfigBucket
        BILLING_CONFIG_KEY: global_billing_config.json
        PAGES_DISTRIBUTION_ID: !Ref PagesDistribution
        PAGES_DISTRIBUTION_DOMAIN: !GetAtt PagesDistribution.DomainName
        PREVIEW_DISTRIBUTION_ID: !Ref PreviewDistribution
        PREVIEW_DISTRIBUTION_DOMAIN: !GetAtt PreviewDistribution.DomainName
        STRIPE_CLIENT_ID: !Ref StripeClientId
        STRIPE_CLIENT_ID_TEST: !Ref StripeClientIdTest
        STRIPE_CLIENT_ID_LIVE: !Ref StripeClientIdLive
        STRIPE_CONNECT_REDIRECT_URI: !Ref StripeConnectRedirectUri
        STRIPE_PLATFORM_SECRET_ARN: !Ref StripePlatformSecretArn
        PUBLIC_API_BASE_URL: !If
          - HasApiCustomDomain
          - !Sub "https://${ApiCustomDomainName}"
          - !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}"
        DASHBOARD_URL: !If
          - HasDashboardCustomDomain
          - !Sub "https://${DashboardCustomDomainName}"
          - !Sub "https://${DashboardDistribution.DomainName}"
        STRIPE_KEYS_KMS_KEY_ID: !Ref StripeKeysEncryptionKey
        COGNITO_USER_POOL_ID: !Ref CognitoUserPoolId
        COGNITO_USER_POOL_CLIENT_ID: !Ref CognitoUserPoolClientId
        CLOUDFLARE_ZONE_ID: !Ref CloudflareZoneId
        CLOUDFLARE_API_TOKEN_SECRET_ARN: !If [HasCloudflareZone, !Ref CloudflareApiTokenSecret, ""]
        CUSTOM_DOMAIN_TARGET_HOST: !Ref CustomDomainTargetHost
        SHORT_URL_HOST: !Ref ShortUrlHost
    Tracing: Active

Resources:
  CloudflareApiTokenSecret:
    Type: AWS::SecretsManager::Secret
    Condition: HasCloudflareZone
    Properties:
      Name: !Sub "${ProjectPrefix}-cloudflare-api-token-${Environment}"
      Description: Cloudflare API token (Zone:SSL and Certificates:Edit + Zone:Custom Hostname:Edit scope) used to manage custom hostnames for tenant custom domains. Populate the real value after deployment via `aws secretsmanager put-secret-value`.
      SecretString: "PLACEHOLDER-SET-VIA-put-secret-value"

  StripeKeysEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "Encrypt tenant Stripe secrets for ${ProjectPrefix}-${Environment}"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableAccountAdministration
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  StripeKeysEncryptionAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${ProjectPrefix}-stripe-keys-${Environment}"
      TargetKeyId: !Ref StripeKeysEncryptionKey

  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Environment
      EndpointConfiguration: REGIONAL
      Cors:
        AllowMethods: "'OPTIONS,GET,POST,PUT,PATCH,DELETE'"
        AllowHeaders: "'Content-Type,Authorization,X-Tenant-Id,X-Client-Id,X-Environment,X-Stripe-Mode'"
        AllowOrigin: "'*'"

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: HasApiCustomDomain
    Properties:
      DomainName: !Ref ApiCustomDomainName
      EndpointConfiguration:
        Types:
          - REGIONAL
      RegionalCertificateArn: !Ref ApiCustomDomainCertificateArn
      SecurityPolicy: TLS_1_2

  ApiCustomDomainBasePathMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: HasApiCustomDomain
    Properties:
      DomainName: !Ref ApiCustomDomain
      RestApiId: !Ref RestApi
      Stage: !Ref Environment

  ApiCustomDomainRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasApiCustomDomain
    Properties:
      HostedZoneName: !Ref ApiCustomDomainHostedZoneName
      Name: !Ref ApiCustomDomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId

  HealthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-health-${Environment}"
      CodeUri: src/
      Handler: handlers.health.lambda_handler
      Description: Health check for stripe-link.
      Events:
        Health:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /health
            Method: GET

  ManifestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-manifest-${Environment}"
      CodeUri: src/
      Handler: handlers.manifest.lambda_handler
      Description: Runtime manifest for stripe-link resource isolation checks.
      Events:
        Manifest:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /manifest
            Method: GET

  AppConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-app-config-api-${Environment}"
      CodeUri: src/
      Handler: handlers.app_config.handler
      Description: Environment-level app configuration API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref AppConfigTable
      Events:
        AppConfigGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /app-config/{config_key}
            Method: GET
        AppConfigPut:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /app-config/{config_key}
            Method: PUT
        AppConfigOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /app-config/{config_key}
            Method: OPTIONS

  OfferResolveFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-offer-resolve-${Environment}"
      CodeUri: src/
      Handler: handlers.offers.resolve_handler
      Description: Resolves an offer against canonical product and price JSON.
      Events:
        ResolveOffer:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /offers/resolve
            Method: POST

  PriceCalculationFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-prices-api-${Environment}"
      CodeUri: src/
      Handler: handlers.prices.handler
      Description: Calculates customer-facing price amounts and fee breakdowns.
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ConfigBucket
      Events:
        PriceCalculate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /prices/calculate
            Method: POST
        PriceCalculateOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /prices/calculate
            Method: OPTIONS

  BillingConnectCardFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-billing-connect-card-${Environment}"
      CodeUri: src/
      Handler: handlers.billing.connect_card_handler
      Description: Returns tenant Stripe Connect card state from billing config and tenant tier.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref TenantProfilesTable
        - DynamoDBCrudPolicy:
            TableName: !Sub "${ProjectPrefix}-tenant-profiles-dev"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${ProjectPrefix}-tenant-profiles-prod"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-dev"
        - DynamoDBCrudPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-prod"
        - S3ReadPolicy:
            BucketName: !Ref ConfigBucket
      Events:
        BillingConnectCard:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /billing/connect-card
            Method: GET
        BillingConnectCardOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /billing/connect-card
            Method: OPTIONS

  ProductsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-products-api-${Environment}"
      CodeUri: src/
      Handler: handlers.products.handler
      Description: JSON-first products API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
      Events:
        ProductsList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products
            Method: GET
        ProductsCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products
            Method: POST
        ProductsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products
            Method: OPTIONS
        ProductsGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}
            Method: GET
        ProductOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}
            Method: OPTIONS
        ProductStatusUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}/status
            Method: PATCH
        ProductStatusOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}/status
            Method: OPTIONS

  ProductSyncFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-product-sync-${Environment}"
      CodeUri: src/
      Handler: handlers.product_sync.handler
      Description: Push a local Product (and its Prices) to the tenant's Stripe account and record the returned ids + sync status.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref ProductsTable
        - DynamoDBReadPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-dev"
        - DynamoDBReadPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-prod"
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
              Resource: !GetAtt StripeKeysEncryptionKey.Arn
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: "*"
      Events:
        ProductSync:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}/sync
            Method: POST
        ProductSyncOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /products/{product_id}/sync
            Method: OPTIONS

  DownloadsUploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-downloads-upload-${Environment}"
      CodeUri: src/
      Handler: handlers.downloads.upload_url_handler
      Description: Tenant -- mint a presigned S3 PUT URL for a digital-product file in the media bucket.
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref MediaBucket
      Events:
        DownloadsUploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /downloads/upload-url
            Method: POST
        DownloadsUploadUrlOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /downloads/upload-url
            Method: OPTIONS

  DownloadServeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-download-serve-${Environment}"
      CodeUri: src/
      Handler: handlers.downloads.serve_handler
      Description: Public -- verify the paid order owns the product, then 302 to a short-lived presigned download URL.
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
        - S3ReadPolicy:
            BucketName: !Ref MediaBucket
      Events:
        DownloadServe:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /download
            Method: GET
        DownloadServeOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /download
            Method: OPTIONS

  RefundsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-refunds-api-${Environment}"
      CodeUri: src/
      Handler: handlers.refunds.handler
      Description: Approve/reject a refund request and execute the Stripe refund on the tenant's connected account (platform fee kept).
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref NotificationsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref OrdersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref RefundsTable
        - DynamoDBReadPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-dev"
        - DynamoDBReadPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-prod"
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
              Resource: !GetAtt StripeKeysEncryptionKey.Arn
        - Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: "*"
      Events:
        RefundAction:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /refunds/{refund_request_id}/{action}
            Method: POST
        RefundActionOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /refunds/{refund_request_id}/{action}
            Method: OPTIONS

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-upload-api-${Environment}"
      CodeUri: src/
      Handler: handlers.upload.handler
      Description: Browser-safe proxy for product image upload presigning and status.
      Environment:
        Variables:
          IMAGE_UPLOAD_API_BASE: https://dph4d1c6p8.execute-api.us-west-2.amazonaws.com/v3
      Events:
        UploadCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload/multiple
            Method: POST
        UploadCreateOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload/multiple
            Method: OPTIONS
        UploadStatus:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload/status/{image_id}
            Method: GET
        UploadStatusOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /upload/status/{image_id}
            Method: OPTIONS

  OffersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-offers-api-${Environment}"
      CodeUri: src/
      Handler: handlers.offers.handler
      Description: JSON-first offers API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref OffersTable
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
      Events:
        OffersList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /offers
            Method: GET
        OffersCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /offers
            Method: POST
        OffersGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /offers/{offer_id}
            Method: GET
        OffersDelete:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /offers/{offer_id}
            Method: DELETE

  CouponsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-coupons-api-${Environment}"
      CodeUri: src/
      Handler: handlers.coupons.handler
      Description: JSON-first coupons API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CouponsTable
      Events:
        CouponsList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons
            Method: GET
        CouponsCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons
            Method: POST
        CouponsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons
            Method: OPTIONS
        CouponsGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons/{coupon_id}
            Method: GET
        CouponsUpdate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons/{coupon_id}
            Method: PUT
        CouponsItemOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /coupons/{coupon_id}
            Method: OPTIONS

  PagesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-pages-api-${Environment}"
      CodeUri: src/
      Handler: handlers.pages.handler
      Description: JSON-first pages API.
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PagesTable
      Events:
        PagesList:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages
            Method: GET
        PagesCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages
            Method: POST
        PagesGet:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages/{page_id}
            Method: GET
        PagesDelete:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages/{page_id}
            Method: DELETE

  PageRenderFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-page-render-${Environment}"
      CodeUri: src/
      Handler: handlers.page_render.handler
      Description: Renders page JSON, offer JSON, and product JSON into HTML.
      Events:
        PageRender:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages/render
            Method: POST

  PostCheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-post-checkout-${Environment}"
      CodeUri: src/
      Handler: handlers.post_checkout.handler
      Description: Resolves and redirects Phase 1 inline funnel routing (post-checkout upsell/downsell/thank-you sequencing) owned by a Page document. Pure routing only — never touches Offer, Product, or Stripe state.
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PagesTable
      Events:
        PostCheckoutNext:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages/{page_id}/post-checkout/next
            Method: GET
        PostCheckoutNextOptions:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /pages/{page_id}/post-checkout/next
            Method: OPTIONS

  CheckoutFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${ProjectPrefix}-checkout-api-${Environment}"
      CodeUri: src/
      Handler: handlers.checkout.handler
      Description: Creates Stripe Checkout sessions from stripe-link offer and product documents.
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref OffersTable
        - DynamoDBReadPolicy:
            TableName: !Ref ProductsTable
        - DynamoDBReadPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-dev"
        - DynamoDBReadPolicy:
            TableName: !Sub "${ProjectPrefix}-stripe-keys-prod"
        - DynamoDBReadPolicy:
            TableName: !Ref TenantProfilesTable
        - S3ReadPolicy:
            BucketName: !Ref ConfigBucket
        - Statement:
            Effect: Allow
            Action:
              - kms:Decrypt
              - kms:DescribeKey
            Resource: !GetAtt StripeKeysEncryptionKey.Arn
        - Statement:
            Effect: Allow
            Action:
              - secretsmanager:GetSecretValue
            Resource: "*"
      Events:
        CheckoutCreate:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /checkout
